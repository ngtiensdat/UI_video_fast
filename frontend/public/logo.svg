<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#fe0979" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle/shield -->
  <rect width="100" height="100" rx="22" fill="#0c0c0e" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />
  
  <!-- Outer glowing rings -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#neonGrad)" stroke-width="2.5" opacity="0.3" />
  
  <!-- Stylized 'L' / Eye shape -->
  <path d="M 42,32 L 42,62 L 62,62" fill="none" stroke="url(#neonGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Glowing lens/eye pupil dot -->
  <circle cx="52" cy="46" r="4.5" fill="#00f2fe" filter="url(#glow)" />
</svg>
